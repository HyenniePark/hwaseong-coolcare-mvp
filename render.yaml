services:
  - type: web
    name: hwaseong-coolcare-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: KMA_SHORT_TERM_FORECAST_KEY
        sync: false
      - key: PUBLIC_DATA_SERVICE_KEY
        sync: false
      - key: SHELTER_API_KEY
        sync: false
      - key: SHELTER_API_URL
        value: https://www.safetydata.go.kr/V2/api/DSSP-IF-10942
      - key: KMA_BASE_NX
        value: 57
      - key: KMA_BASE_NY
        value: 119
      - key: CORS_ORIGINS
        sync: false
